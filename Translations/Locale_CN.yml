# 文本支持完整十六进制颜色代码以及各类变量
# 注意：部分变量在特定提示行中无法生效
# 请保持原有配置结构不变，无需调整换行与层级即可正常运行

# 全局变量说明（作用目标玩家，例如执行 /heal Zrips 时，变量读取Zrips的数据）
# [serverName] 服务器名称
# [playerName] 目标玩家游戏ID
# [playerDisplayName] 目标玩家自定义昵称
# [lvl] 目标玩家等级
# [exp] 目标玩家总经验值
# [hp] 目标玩家当前生命值
# [maxHp] 目标玩家最大生命值
# [hunger] 目标玩家饥饿值
# [gameMode] 目标玩家游戏模式
# [prefix] 目标玩家权限前缀（如有）
# [suffix] 目标玩家权限后缀（如有）

# 执行者变量（执行指令的玩家/控制台，Zrips执行 /heal Zhax 时读取Zrips信息）
# [senderName] 执行者游戏ID
# [senderDisplayName] 执行者自定义昵称
# [senderLvl] 执行者等级
# [senderExp] 执行者总经验
# [senderHp] 执行者当前生命值
# [senderMaxHp] 执行者最大生命值
# [senderHunger] 执行者饥饿值
# [senderGameMode] 执行者游戏模式
# [senderPrefix] 执行者权限前缀
# [senderSuffix] 执行者权限后缀

# 源玩家变量（提取坐标/数据的参考玩家，例 /tp Zhax Zrips 以Zhax坐标为源）
# [sourceName] 源玩家游戏ID
# [sourceDisplayName] 源玩家昵称
# [sourceLvl] 源玩家等级
# [sourceExp] 源玩家总经验
# [sourceHp] 源玩家生命值
# [sourceMaxHp] 源玩家最大生命
# [sourceHunger] 源玩家饥饿值
# [sourceGameMode] 源玩家游戏模式
# [sourcePrefix] 源玩家前缀
# [sourceSuffix] 源玩家后缀

# ***********************************************
# 消息输出渠道控制（可发送至动作栏、标题、弹窗、可点击JSON文本）
# 前缀规则：
# !toast! 成就弹窗提示（仅1.12+可用），附加参数示例：!toast! -t:goal -icon:paper 文本内容
# !actionbar! 底部动作栏文字
# !actionbar:[秒数]! 持续指定秒数的动作栏文字
# !broadcast! 全服广播，可叠加其他渠道标签，例 !broadcast!!title! 全服弹出标题
# !customtext:[文本名]! 读取自定义文本展示；搭配!broadcast!则全服玩家接收
# !title! 大标题，可搭配!subtitle!添加副标题
# !bossbar:[名称]-[时长]! 血条提示，同名血条会覆盖避免堆叠

# 可点击JSON文本格式：<T>显示文字</T><H>悬浮提示</H><C>执行指令</C><SC>输入建议</SC>
# <T></T>为必填项，其余标签可选
# /n 用于换行
# 多条JSON消息分隔符 <Next>
# <C> 点击者以自身身份执行指令
# <CC> 控制台仅执行一次指令
# <CCI> 每次点击均由控制台执行指令
# <URL> 插入超链接

